<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
    <!-- Background Color -->
    <rect width="100%" height="100%" fill="white"/>
  
    <!-- Multiple Circles -->
    <circle cx="150" cy="150" r="100" fill="#A7D3EO" opacity="0.1"/>
    <circle cx="350" cy="150" r="80" fill="#b2ebf2" opacity="0.1"/>
    <circle cx="250" cy="250" r="120" fill="#A7D3EO" opacity="0.1"/>
    <circle cx="150" cy="350" r="90" fill="#b2ebf2" opacity="0.1"/>
    <circle cx="350" cy="350" r="60" fill="#A7D3EO" opacity="0.1"/>
  
    <!-- Diagonal Stripes for a Modern Look -->
    <rect x="0" y="0" width="500" height="500" fill="none" stroke="#A7D3EO" stroke-width="15" stroke-dasharray="20,20"/>
    
    <!-- Extra Circles for Depth -->
    <circle cx="100" cy="400" r="50" fill="#A7D3EO" opacity="0.1"/>
    <circle cx="400" cy="100" r="70" fill="#b2ebf2" opacity="0.1"/>
  </svg>
  